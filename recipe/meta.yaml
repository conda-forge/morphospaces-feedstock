{% set name = "morphospaces" %}
{% set version = "0.0.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/morphospaces-{{ version }}.tar.gz
  sha256: 15a07b3ebd0bc02c6974ba436082a69a35be63956b4c7f052d93be923e05028f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python >=3.8
    - setuptools-scm
  run:
    - h5py
    - magicgui
    - numpy
    - python >=3.8
    - pytorch-lightning
    - qtpy
    - scikit-image
    - scipy

test:
  imports:
    - morphospaces
  commands:
    - pip list
    # - pip check  # pytorch-lightning requirements missmatch 
  requires:
    - napari
    - pip

about:
  home: https://github.com/morphometrics/morphospaces
  summary: a library for creating  and exploring morphospaces.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - goanpeca
    - jaimergp
